interface:
  display_name: "Cover and Copy"
  short_description: "根据文案、脚本或大纲生成短视频封面、小红书标题和正文"
  default_prompt: "使用 $Cover and Copy，根据我的文案、脚本或大纲生成 3 张 3:4 竖版封面；生成封面前读取 references/cover-styles/ 里的可用风格并自动匹配最合适的风格，不要停下来让我确认；先用 view_image 载入默认人脸参考图，再优先调用 Codex 内置 image_gen 直接生图并强制锁定本人身份；只有内置 image_gen 不可用或需要兜底时才使用 scripts/face_edit_cover.py；需要时延展为 16:9 和 4:3 横版，并生成小红书标题和 200 字左右正文。"
